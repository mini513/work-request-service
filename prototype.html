<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사내 업무 요청 서비스</title>
<style>
/* ── Reset & Variables ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { overflow: hidden; height: 100vh; }
:root {
  --bg: #0e1015;
  --surface: #161a22;
  --surface2: #1e2330;
  --surface3: #262c3a;
  --border: #2a3040;
  --text: #e2e5ec;
  --text-dim: #7b8298;
  --text-mid: #a0a8be;
  --accent: #5b8def;
  --accent-bg: rgba(91,141,239,0.12);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.12);
  --red: #f55;
  --red-bg: rgba(255,85,85,0.12);
  --yellow: #ff8c00;
  --yellow-bg: rgba(255,140,0,0.12);
  --blue: #5b8def;
  --blue-bg: rgba(91,141,239,0.12);
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}
body.light {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #f5f6f8;
  --surface3: #e8eaef;
  --border: #d4d8e0;
  --text: #1a1d27;
  --text-dim: #6b7085;
  --text-mid: #4a5068;
  --accent: #4f46e5;
  --accent-bg: rgba(79,70,229,0.1);
  --green: #16a34a;
  --green-bg: rgba(22,163,74,0.1);
  --red: #dc2626;
  --red-bg: rgba(220,38,38,0.08);
  --yellow: #f97316;
  --yellow-bg: rgba(249,115,22,0.1);
  --blue: #2563eb;
  --blue-bg: rgba(37,99,235,0.08);
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
body {
  font-family: 'Segoe UI', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-size: 14px;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: 52px;
  gap: 16px;
  flex-shrink: 0;
}
.header-logo {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
}
.header-spacer { flex: 1; }

/* Role Switcher */
.role-switcher {
  display: flex;
  background: var(--surface2);
  border-radius: 6px;
  padding: 2px;
  gap: 2px;
}
.role-btn {
  padding: 5px 14px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-size: 13px;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
}
.role-btn:hover { color: var(--text); }
.role-btn.active {
  background: var(--accent);
  color: #fff;
}

/* Notification Bell */
.noti-wrap { position: relative; }
.noti-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 36px;
  height: 36px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.noti-btn:hover { border-color: var(--accent); color: var(--text); }
.noti-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 16px;
  height: 16px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}
.noti-dropdown {
  position: absolute;
  top: 44px;
  right: 0;
  width: 360px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  z-index: 1000;
  display: none;
  max-height: 400px;
  overflow-y: auto;
}
.noti-dropdown.show { display: block; }
.noti-dropdown-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.noti-item {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.noti-item:hover { background: var(--surface2); }
.noti-item.unread { background: var(--accent-bg); }
.noti-item.unread:hover { background: var(--blue-bg); }
.noti-item.urgent .noti-msg { color: var(--red); font-weight: 600; }
.noti-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  margin-top: 5px;
}
.noti-item:not(.unread) .noti-dot { background: transparent; }
.noti-msg { font-size: 13px; line-height: 1.4; }
.noti-time { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* Header Icon Buttons */
.icon-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 36px;
  height: 36px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-btn:hover { border-color: var(--accent); color: var(--text); }

/* ── Layout ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 12px 0;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.sidebar-section {
  padding: 8px 16px 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.sidebar-item {
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-mid);
  cursor: pointer;
  font-size: 13px;
  border-left: 3px solid transparent;
  transition: all 0.1s;
}
.sidebar-item:hover { background: var(--surface2); color: var(--text); }
.sidebar-item.active {
  background: var(--accent-bg);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 600;
}
.sidebar-item .icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-item .badge-count {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 18px;
  height: 18px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
}
.sidebar-spacer { flex: 1; }
.sidebar-bottom {
  border-top: 1px solid var(--border);
  padding-top: 8px;
}

/* ── Main Content ── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* Page Header */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.page-title {
  font-size: 18px;
  font-weight: 700;
}
.page-subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ── Buttons ── */
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); }
.btn-danger {
  background: var(--red-bg);
  color: var(--red);
}
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ── Badges ── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}

/* ── Stat Cards ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.stat-label {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.stat-value {
  font-size: 28px;
  font-weight: 700;
}
.stat-sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* ── Filter Bar ── */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-btn {
  padding: 5px 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active {
  background: var(--accent-bg);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}
.search-wrap {
  display: flex;
  align-items: center;
  margin-left: auto;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface2);
  overflow: hidden;
}
.search-wrap:focus-within { border-color: var(--accent); }
.search-input {
  padding: 6px 12px;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 13px;
  width: 180px;
  outline: none;
}
.search-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  flex-shrink: 0;
}
.search-btn:hover { color: var(--accent); }
.filter-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 5px;
}
.filter-group label {
  font-size: 12px;
  color: var(--text-dim);
  white-space: nowrap;
}
.filter-select {
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  outline: none;
  min-width: 90px;
}
.filter-select:focus { border-color: var(--accent); }
.filter-reset-btn {
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
}
.filter-reset-btn:hover { border-color: var(--accent); color: var(--text); }
.status-dropdown-wrap { position: relative; }
.status-badge-btn {
  cursor: pointer;
  transition: opacity 0.15s;
}
.status-badge-btn:hover { opacity: 0.8; }
.status-badge-btn .arrow { font-size: 7px; opacity: 0.5; margin-left: 1px; }
.status-dropdown {
  position: fixed;
  z-index: 10000;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow);
  min-width: 140px;
  padding: 4px;
  display: none;
}
.status-dropdown.show { display: block; }
.status-dropdown-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  color: var(--text);
}
.status-dropdown-item:hover { background: var(--surface2); }
.status-dropdown-item .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dropdown-item.current {
  font-weight: 600;
  color: var(--accent);
}
.status-dropdown-item.disabled {
  opacity: 0.35;
  cursor: default;
  pointer-events: none;
}

/* ── Scenario Map ── */
.smap-role-section { margin-bottom: 28px; }
.smap-role-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-weight: 700;
  font-size: 14px;
}
.smap-role-header.requester { background: var(--blue-bg); color: var(--blue); }
.smap-role-header.manager { background: var(--yellow-bg); color: var(--yellow); }
.smap-role-header.worker { background: var(--green-bg); color: var(--green); }
.smap-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 6px;
}
.smap-main-flow {
  display: flex;
  align-items: flex-start;
  gap: 0;
  overflow-x: auto;
  padding-bottom: 12px;
}
.smap-node {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 110px;
  flex-shrink: 0;
}
.smap-node-box {
  padding: 8px 14px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  color: var(--text);
  white-space: nowrap;
}
.smap-sub-steps {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
  width: 100%;
}
.smap-sub-step {
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 10px;
  color: var(--text-mid);
  text-align: center;
  white-space: nowrap;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.smap-connector {
  display: flex;
  align-items: flex-start;
  padding-top: 10px;
  color: var(--text-dim);
  font-size: 18px;
  flex-shrink: 0;
  width: 24px;
  justify-content: center;
}
.smap-note {
  font-size: 10px;
  color: var(--accent);
  margin-top: 6px;
  text-align: center;
}
.smap-legend {
  display: flex;
  gap: 16px;
  padding: 12px 0;
  border-top: 1px solid var(--border);
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-dim);
}

/* ── IA Map ── */
.ia-service {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.ia-root {
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  text-align: center;
}
.ia-roles-row {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 0;
  position: relative;
}
.ia-vline {
  width: 2px;
  height: 20px;
  background: var(--border);
  margin: 0 auto;
}
.ia-roles-row::before {
  content: '';
  position: absolute;
  top: 0;
  left: var(--hline-left, 10%);
  width: var(--hline-width, 80%);
  height: 2px;
  background: var(--border);
}
.ia-role-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 200px;
}
.ia-role-box {
  padding: 8px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 13px;
  text-align: center;
  margin-bottom: 0;
}
.ia-role-box.requester { background: var(--blue-bg); color: var(--blue); border: 2px solid var(--blue); }
.ia-role-box.manager { background: var(--yellow-bg); color: var(--yellow); border: 2px solid var(--yellow); }
.ia-role-box.worker { background: var(--green-bg); color: var(--green); border: 2px solid var(--green); }
.ia-pages {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  width: 100%;
}
.ia-page-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}
.ia-page {
  padding: 6px 16px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  white-space: nowrap;
}
.ia-features {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  margin-top: 4px;
  margin-bottom: 4px;
}
.ia-feature {
  padding: 3px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 10px;
  color: var(--text-dim);
  text-align: center;
  white-space: nowrap;
}
.ia-vline-sm {
  width: 1.5px;
  height: 10px;
  background: var(--border);
  margin: 0 auto;
}
.ia-common {
  margin-top: 20px;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.ia-common-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  margin-right: 4px;
}
.ia-common-item {
  font-size: 11px;
  padding: 3px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-mid);
}

/* ── Stakeholder Map (동심원) ── */
.sh-map { display: flex; flex-direction: column; align-items: center; gap: 32px; padding: 24px; }
.sh-concentric { position: relative; width: 640px; height: 640px; margin: 0 auto; }
.sh-ring { position: absolute; border-radius: 50%; border: 2px dashed; display: flex; align-items: center; justify-content: center; }
.sh-ring.outer { width: 640px; height: 640px; top: 0; left: 0; border-color: var(--border); background: var(--surface); }
.sh-ring.middle { width: 420px; height: 420px; top: 110px; left: 110px; border-color: var(--border); background: var(--surface2); }
.sh-ring.core { width: 200px; height: 200px; top: 220px; left: 220px; border-color: var(--accent); background: var(--accent-bg); z-index: 2; }
.sh-ring-label { position: absolute; font-size: 10px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.sh-node { position: absolute; z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 10px 14px; background: var(--surface); border: 2px solid; border-radius: 10px; font-size: 12px; text-align: center; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.sh-node.core-node { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; font-size: 14px; }
.sh-node-role { font-weight: 700; font-size: 13px; }
.sh-node-name { font-size: 11px; color: var(--text-mid); }
.sh-node.requester { border-color: var(--blue); }
.sh-node.requester .sh-node-role { color: var(--blue); }
.sh-node.manager { border-color: var(--yellow); }
.sh-node.manager .sh-node-role { color: var(--yellow); }
.sh-node.worker { border-color: var(--green); }
.sh-node.worker .sh-node-role { color: var(--green); }
.sh-node.reporter { border-color: #7c3aed; }
.sh-node.reporter .sh-node-role { color: #7c3aed; }
.sh-flow-section { width: 100%; }
.sh-flow-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.sh-flow-list { display: flex; flex-direction: column; gap: 8px; }
.sh-flow-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.sh-flow-from, .sh-flow-to { font-weight: 600; font-size: 12px; padding: 4px 10px; border-radius: 6px; white-space: nowrap; }
.sh-flow-arrow { font-size: 16px; color: var(--text-dim); flex-shrink: 0; }
.sh-flow-label { font-size: 12px; color: var(--text-mid); padding-left: 8px; border-left: 2px solid var(--border); }
.sh-legend { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.sh-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-mid); }
.sh-legend-color { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.1); }

/* ── Kanban Board ── */
.kanban-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 16px; }
.kanban-col { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px; min-height: 200px; }
.kanban-col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
.kanban-col-title { font-weight: 700; font-size: 13px; color: var(--text); }
.kanban-col-count { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
.kanban-cards { display: flex; flex-direction: column; gap: 8px; }
.kanban-card { padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s; }
.kanban-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(91,141,239,0.15); }
.kanban-card-id { font-size: 11px; color: var(--text-dim); font-weight: 600; }
.kanban-card-title { font-size: 13px; font-weight: 600; color: var(--text); margin: 4px 0; line-height: 1.4; }
.kanban-card-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
.kanban-card-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.kanban-empty { text-align: center; color: var(--text-dim); font-size: 12px; padding: 24px 0; }

/* ── Service Blueprint ── */
.bp-wrap { padding: 16px; overflow-x: auto; }
.bp-table { border-collapse: collapse; width: 100%; min-width: 900px; }
.bp-table th, .bp-table td { padding: 10px 14px; text-align: center; vertical-align: top; font-size: 12px; border: 1px solid var(--border); }
.bp-table th { font-weight: 700; font-size: 11px; white-space: nowrap; }
.bp-layer-label { writing-mode: vertical-rl; text-orientation: mixed; font-weight: 700; font-size: 11px; letter-spacing: 1px; padding: 8px 6px !important; white-space: nowrap; min-width: 36px; }
.bp-layer-label.user { background: var(--blue-bg); color: var(--blue); }
.bp-layer-label.front { background: var(--accent-bg); color: var(--accent); }
.bp-layer-label.back { background: var(--yellow-bg); color: var(--yellow); }
.bp-layer-label.support { background: var(--green-bg); color: var(--green); }
.bp-step-header { background: var(--surface2); font-weight: 700; font-size: 12px; color: var(--text); }
.bp-cell { background: var(--surface); color: var(--text-mid); font-size: 11px; line-height: 1.5; }
.bp-cell.empty { background: var(--bg); color: var(--text-dim); font-style: italic; }
.bp-divider-row td { height: 4px; padding: 0 !important; border: none; }
.bp-line-label { font-size: 10px; font-weight: 700; color: var(--text-dim); text-align: right; padding: 2px 8px !important; border: none; background: transparent; letter-spacing: 0.5px; }
.bp-phase-header { background: var(--accent); color: #fff; font-weight: 700; font-size: 12px; text-align: center; padding: 8px !important; }
.bp-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.bp-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-mid); }
.bp-legend-bar { width: 14px; height: 14px; border-radius: 3px; }

/* ── Request List ── */
.req-list { display: flex; flex-direction: column; gap: 8px; }
.req-item {
  display: grid;
  grid-template-columns: 80px 80px 1fr 100px 100px 90px 100px;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.1s;
  font-size: 13px;
}
.req-item:hover { border-color: var(--accent); background: var(--surface2); }
.req-item .req-id { color: var(--text-dim); font-size: 12px; font-family: monospace; }
.req-item .req-category { font-size: 12px; }
.req-item .req-title-cell {}
.req-item .req-title { font-weight: 500; }
.req-item .req-requester { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.req-item .req-priority {}
.req-item .req-status {}
.req-item .req-date { font-size: 12px; color: var(--text-dim); }
.req-item .req-assignee { font-size: 12px; color: var(--text-dim); }

.req-list-header {
  display: grid;
  grid-template-columns: 80px 80px 1fr 100px 100px 90px 100px;
  gap: 12px;
  padding: 8px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.req-list-header .sortable {
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 3px;
}
.req-list-header .sortable:hover { color: var(--text); }
.sort-arrow { font-size: 9px; color: var(--accent); font-weight: 700; }
.stats-table th.sortable { cursor: pointer; user-select: none; }
.stats-table th.sortable:hover { color: var(--accent); }

/* ── Request Detail ── */
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 20px;
}
.detail-left {}
.detail-right {}
.detail-info-row {
  display: flex;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.detail-info-label {
  width: 100px;
  color: var(--text-dim);
  flex-shrink: 0;
}
.detail-info-value { flex: 1; }
.detail-content {
  padding: 16px;
  background: var(--surface2);
  border-radius: var(--radius);
  font-size: 13px;
  line-height: 1.6;
  margin: 16px 0;
}

/* Status Stepper */
.status-stepper {
  display: flex;
  gap: 0;
  margin: 16px 0;
}
.step {
  flex: 1;
  text-align: center;
  position: relative;
  padding: 8px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.step::before {
  content: '';
  position: absolute;
  top: 14px;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--border);
}
.step:first-child::before { left: 50%; }
.step:last-child::before { right: 50%; }
.step.done::before, .step.current::before { background: var(--accent); }
.step-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--border);
  margin: 0 auto 8px;
  position: relative;
  z-index: 1;
}
.step.done .step-dot { background: var(--accent); }
.step.current .step-dot {
  background: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-bg);
}
.step-label {
  font-size: 11px;
  color: var(--text-dim);
}
.step.done .step-label, .step.current .step-label { color: var(--accent); font-weight: 600; }

/* Timeline */
.timeline { margin: 16px 0; }
.timeline-item {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  position: relative;
}
.timeline-item:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 5px;
  top: 24px;
  bottom: -8px;
  width: 2px;
  background: var(--border);
}
.timeline-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  margin-top: 4px;
}
.timeline-content { flex: 1; }
.timeline-action { font-size: 13px; font-weight: 500; }
.timeline-detail { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.timeline-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* Comments */
.comments-section { margin-top: 20px; }
.comments-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.comment-item {
  display: flex;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.comment-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--surface3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.comment-body { flex: 1; }
.comment-header { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
.comment-name { font-size: 13px; font-weight: 600; }
.comment-date { font-size: 11px; color: var(--text-dim); }
.comment-text { font-size: 13px; line-height: 1.5; }
.comment-input-wrap {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.comment-input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  border-radius: 6px;
  font-size: 13px;
}
.comment-input:focus { outline: none; border-color: var(--accent); }

/* ── Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 520px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
}
.modal-close:hover { background: var(--surface2); color: var(--text); }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ── Forms ── */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-mid);
  margin-bottom: 6px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-select { cursor: pointer; }

/* ── Assignment Panel ── */
.assign-panel {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 12px;
}
.assign-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.assign-label {
  font-size: 12px;
  color: var(--text-dim);
  width: 60px;
  flex-shrink: 0;
}

/* ── KPI Alert ── */
.kpi-alert {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--red-bg);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  margin-bottom: 12px;
  font-size: 13px;
  color: var(--red);
}
.kpi-alert .icon { font-size: 16px; }

/* ── Log / Stats Table ── */
.stats-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.stats-table th {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 2px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
}
.stats-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}

/* ── Charts ── */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.chart-card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
}
.bar-chart {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.bar-label {
  width: 60px;
  font-size: 12px;
  color: var(--text-mid);
  text-align: right;
  flex-shrink: 0;
}
.bar-track {
  flex: 1;
  height: 24px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
  min-width: 2px;
}
.bar-value {
  width: 32px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  text-align: left;
  flex-shrink: 0;
}
.donut-wrap {
  display: flex;
  align-items: center;
  gap: 24px;
  justify-content: center;
}
.donut-svg {
  width: 120px;
  height: 120px;
  transform: rotate(-90deg);
}
.donut-legend {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.donut-legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-mid);
}
.donut-legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.donut-legend-count {
  font-weight: 600;
  color: var(--text);
  margin-left: auto;
  padding-left: 12px;
}

/* ── Dev Mode ── */
.dev-panel {
  position: fixed;
  right: -380px;
  top: 52px;
  bottom: 0;
  width: 380px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 3000;
  transition: right 0.25s ease;
  overflow-y: auto;
  box-shadow: -4px 0 16px rgba(0,0,0,0.3);
}
.dev-panel.open { right: 0; }
.dev-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--accent-bg);
}
.dev-panel-title { font-size: 14px; font-weight: 700; color: var(--accent); }
.dev-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.dev-section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-mid);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dev-section-title .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.dev-tag {
  display: inline-block;
  padding: 4px 8px;
  background: var(--accent-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 12px;
  font-family: monospace;
  color: var(--accent);
  margin-bottom: 6px;
}
.dev-chain {
  font-size: 12px;
  line-height: 1.8;
  color: var(--text-dim);
  padding-left: 8px;
}
.dev-chain .active-node { color: var(--accent); font-weight: 600; background: var(--accent-bg); padding: 1px 4px; border-radius: 3px; }
.dev-path {
  padding: 8px;
  background: var(--surface2);
  border-radius: 4px;
  font-size: 11px;
  font-family: monospace;
  color: var(--text-mid);
  word-break: break-all;
}
.dev-copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-mid);
  cursor: pointer;
  margin-top: 6px;
}
.dev-copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.dev-color-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
}
.dev-color-row label { font-size: 12px; color: var(--text-mid); }
.dev-color-row .color-group { display: flex; align-items: center; gap: 6px; }
.dev-color-input {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  background: none;
  padding: 0;
}
.dev-color-hex {
  width: 70px;
  padding: 4px 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  border-radius: 4px;
  font-size: 11px;
  font-family: monospace;
}
.dev-slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
}
.dev-slider-row label { font-size: 12px; color: var(--text-mid); width: 40px; }
.dev-slider-row input[type="range"] {
  flex: 1;
  accent-color: var(--accent);
}
.dev-slider-row .val {
  width: 40px;
  padding: 3px 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  border-radius: 4px;
  font-size: 11px;
  text-align: center;
}
.dev-weight-btns { display: flex; gap: 4px; }
.dev-weight-btn {
  flex: 1;
  padding: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  text-align: center;
}
.dev-weight-btn:hover { border-color: var(--accent); }
.dev-weight-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── Scenario Mode ── */
.scenario-bar {
  display: none;
  flex-direction: column;
  gap: 8px;
  padding: 10px 20px;
  background: var(--accent-bg);
  border-bottom: 1px solid var(--accent);
  font-size: 13px;
  flex-shrink: 0;
}
.scenario-bar.show { display: flex; }
.scenario-top-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.scenario-top-row .step-text { flex: 1; }
.scenario-top-row .step-text strong { color: var(--accent); }
.scenario-group-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: 4px;
  padding: 2px 8px;
  white-space: nowrap;
}
.scenario-bottom-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding-left: 28px;
  overflow-x: auto;
  scrollbar-width: none;
}
.scenario-bottom-row::-webkit-scrollbar { display: none; }
.scenario-step-chip {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.scenario-step-chip.done { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.scenario-step-chip.current { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.scenario-step-chip:hover { border-color: var(--accent); }
.scenario-group-divider {
  width: 1px;
  height: 14px;
  background: var(--border);
  margin: 0 2px;
}
.scenario-group-name {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-dim);
  white-space: nowrap;
  margin-right: -2px;
}
.scenario-group-name.active {
  color: var(--accent);
  font-weight: 700;
}

/* ── Helpers ── */
.text-dim { color: var(--text-dim); }
.text-accent { color: var(--accent); }
.text-red { color: var(--red); }
.text-green { color: var(--green); }
.text-yellow { color: var(--yellow); }
.fw-600 { font-weight: 600; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.gap-8 { gap: 8px; }
.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.hidden { display: none !important; }

/* Empty State / No Data */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-dim);
  gap: 12px;
}
.empty-state-icon {
  font-size: 48px;
  opacity: 0.5;
}
.empty-state-icon svg {
  width: 64px;
  height: 64px;
  stroke: var(--text-dim);
  opacity: 0.4;
}
.empty-state-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-mid);
}
.empty-state-desc {
  font-size: 13px;
  color: var(--text-dim);
}

/* highlight for dev mode */
.dev-highlight {
  outline: 2px solid var(--accent) !important;
  outline-offset: 2px;
}

/* Scenario Pulse */
@keyframes scenario-pulse {
  0% { box-shadow: 0 0 0 0 rgba(91,141,239,0.6); }
  50% { box-shadow: 0 0 0 8px rgba(91,141,239,0); }
  100% { box-shadow: 0 0 0 0 rgba(91,141,239,0); }
}
body.light .scenario-target {
  --pulse-color: rgba(79,70,229,0.5);
}
.scenario-target {
  animation: scenario-pulse 1.5s ease-in-out infinite !important;
  outline: 2px solid var(--accent) !important;
  outline-offset: 3px;
  position: relative;
  z-index: 100;
}
.scenario-target::after {
  content: '👆 여기를 클릭';
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 101;
}
.scenario-target-no-label {
  animation: scenario-pulse 1.5s ease-in-out infinite !important;
  outline: 2px solid var(--accent) !important;
  outline-offset: 3px;
  cursor: pointer;
}
.scenario-target-no-label.clicked {
  animation: none !important;
  outline: 2px solid var(--accent) !important;
  outline-offset: 3px;
}

/* Hamburger Menu */
.hamburger-wrap { position: relative; }
.hamburger-dropdown {
  position: absolute;
  top: 44px;
  left: 0;
  width: 240px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  z-index: 1000;
  display: none;
  padding: 12px 0;
}
.hamburger-dropdown.show { display: block; }
.ham-section {
  padding: 8px 16px;
}
.ham-section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 8px;
}
.ham-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 0;
}
.ham-divider-double {
  height: 0;
  border-top: 1.5px solid var(--border);
  border-bottom: 1.5px solid var(--border);
  padding-top: 3px;
  margin: 8px 0;
}
.ham-role-btns {
  display: flex;
  gap: 4px;
}
.ham-role-btn {
  flex: 1;
  padding: 6px 0;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.ham-role-btn:hover { border-color: var(--accent); color: var(--text); }
.ham-role-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.ham-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0;
}
.ham-toggle-label {
  font-size: 13px;
  color: var(--text-mid);
}
.toggle-switch {
  position: relative;
  width: 40px;
  height: 22px;
  cursor: pointer;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 11px;
  transition: 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 3px;
  top: 3px;
  background: #fff;
  border-radius: 50%;
  transition: 0.2s;
}
.toggle-switch input:checked + .toggle-slider {
  background: var(--accent);
}
.toggle-switch input:checked + .toggle-slider::before {
  transform: translateX(18px);
}
.ham-action-btn {
  width: 100%;
  padding: 6px 0;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-mid);
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.ham-action-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Current role indicator in header */
.current-role-badge {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 4px;
  font-weight: 600;
  background: var(--accent-bg);
  color: var(--accent);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body class="light">

<!-- Scenario Bar -->
<div class="scenario-bar" id="scenarioBar">

  <button class="icon-btn" onclick="toggleTheme()" title="테마 전환" id="themeBtn">☀️</button>
  <button class="icon-btn" onclick="toggleFullscreen()" title="전체화면" id="fullscreenBtn">⛶</button>
</div>

<!-- Layout -->

<!-- New Request Modal -->

  <div class="modal">

<script src="data.js"></script>
<script>
// ── State ──
let currentRole = 'requester';
let currentPage = 'list';
let currentDetailId = null;
let currentFilter = '전체';
let currentSearch = '';
let filterCategory = '전체';
let filterPriority = '전체';
let filterAssignee = '전체';
let sortKey = 'priority';
let sortDir = 'asc';
let devMode = false;
let devHighlighted = null;
let scenarioActive = false;
let scenarioStep = 0;

const SIDEBAR_MENUS = {
  requester: [
    { id: 'list', icon: '📋', label: '내 요청 목록' },
    { id: 'new', icon: '➕', label: '새 요청 등록' },
  ],
  manager: [
    { id: 'dashboard', icon: '📊', label: '대시보드' },
    { id: 'list', icon: '📋', label: '전체 요청 목록' },
    { id: 'log', icon: '📈', label: '처리 현황' },
  ],
  worker: [
    { id: 'dashboard', icon: '📊', label: '대시보드' },
    { id: 'list', icon: '📋', label: '내 담당 목록' },
  ],
};

// ── Role Switch ──
const ROLE_LABELS = { requester: '요청자', manager: '관리자', worker: '실무자' };

function switchRole(role) {
  currentRole = role;
  currentPage = (role === 'manager' || role === 'worker') ? 'dashboard' : 'list';
  currentDetailId = null;
  currentFilter = '전체';
  currentSearch = '';
  filterCategory = '전체';
  filterPriority = '전체';
  filterAssignee = '전체';
  sortKey = 'priority';
  sortDir = 'asc';
  document.querySelectorAll('.ham-role-btn').forEach(b => b.classList.toggle('active', b.dataset.role === role));
  document.getElementById('currentRoleBadge').textContent = ROLE_LABELS[role];
  renderSidebar();
  renderPage();
  renderNotiBadge();
}

function toggleHamburger() {
  document.getElementById('hamburgerDropdown').classList.toggle('show');
}

// ── Sidebar ──
function renderSidebar() {
  const menus = SIDEBAR_MENUS[currentRole];
  let html = `<div class="sidebar-section">${currentRole === 'requester' ? '요청자 메뉴' : currentRole === 'manager' ? '관리자 메뉴' : '실무자 메뉴'}</div>`;
  menus.forEach(m => {
    const badgeVal = m.badge ? m.badge() : 0;
    html += `<div class="sidebar-item ${currentPage === m.id ? 'active' : ''}" onclick="navigateTo('${m.id}')">
      <span class="icon">${m.icon}</span>${m.label}
      ${badgeVal > 0 ? `<span class="badge-count">${badgeVal}</span>` : ''}
    </div>`;
  });
  html += `<div class="sidebar-spacer"></div>`;
  document.getElementById('sidebar').innerHTML = html;
}

function navigateTo(page) {
  if (page === 'new') { openModal('newReqModal'); return; }
  currentPage = page;
  currentDetailId = null;
  renderSidebar();
  renderPage();
}

function navigateWithFilter(status) {
  currentPage = 'list';
  currentFilter = status;
  currentDetailId = null;
  renderSidebar();
  renderPage();
}

// ── Page Rendering ──
function renderPage() {
  const main = document.getElementById('mainContent');
  switch (currentRole) {
    case 'requester':
      if (currentDetailId) renderDetail(main);
      else renderRequesterList(main);
      break;
    case 'manager':
      if (currentDetailId) renderDetail(main);
      else if (currentPage === 'dashboard') renderDashboard(main);
      else if (currentPage === 'log') renderLog(main);
      else renderManagerList(main);
      break;
    case 'worker':
      if (currentDetailId) renderDetail(main);
      else if (currentPage === 'dashboard') renderWorkerDashboard(main);
      else renderWorkerList(main);
      break;
  }
}

// ── Requester List ──
function renderRequesterList(el) {
  const myReqs = applyFilters([...REQUESTS].filter(r => r.requester.id === 'u1'));
  el.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">내 요청 목록</div><div class="page-subtitle">등록한 업무 요청의 진행 상황을 확인합니다</div></div>
      <button class="btn btn-primary" onclick="openModal('newReqModal')">➕ 새 요청</button>
    </div>
    ${renderFilterBar('requester')}
    ${renderSortableHeader([{key:'id',label:'ID'},{key:'category',label:'카테고리'},{key:'title',label:'제목'},{key:'priority',label:'긴급도'},{key:'status',label:'상태'},{key:'date',label:'등록일'},{key:'assignee',label:'담당자'}])}
    <div class="req-list">${myReqs.length ? myReqs.map(r => renderReqRow(r)).join('') : renderEmptyState('해당하는 요청이 없습니다', '필터를 변경하거나 새 요청을 등록해 보세요')}</div>
  `;
}

// ── Manager List ──
function renderManagerList(el) {
  let reqs = applyFilters([...REQUESTS]);

  const isUnassignedFilter = currentFilter === '미배정';

  let alertHtml = '';
  if (isUnassignedFilter) {
    const kpiAlerts = REQUESTS.filter(r => !r.assignee && getDaysSince(r.createdAt) >= 1.5);
    kpiAlerts.forEach(r => {
      const days = getDaysSince(r.createdAt);
      alertHtml += `<div class="kpi-alert" style="cursor:pointer" onclick="openAssignModal('${r.id}')"><span class="icon">⚠️</span><span><strong>${r.id}</strong> ${r.title} — 접수 후 ${days.toFixed(0)}일 경과, 담당자 미배정 <em style="color:var(--text-dim)">(클릭하여 배정)</em></span></div>`;
    });
  }

  el.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">전체 요청 목록</div><div class="page-subtitle">모든 부서의 업무 요청을 관리합니다</div></div>
    </div>
    ${renderFilterBar('manager')}
    ${alertHtml}
    ${renderSortableHeader([{key:'id',label:'ID'},{key:'category',label:'카테고리'},{key:'title',label:'제목'},{key:'priority',label:'긴급도'},{key:'status',label:'상태'},{key:'date',label:'등록일'},{key:'assignee',label:'담당자'}])}
    <div class="req-list">${reqs.length ? reqs.map(r => renderReqRow(r, isUnassignedFilter)).join('') : renderEmptyState('해당하는 요청이 없습니다', '필터를 변경해 보세요')}</div>
  `;
}

// ── Worker List ──
function renderWorkerDashboard(el) {
  const myReqs = REQUESTS.filter(r => r.assignee && r.assignee.id === 'u3');
  const total = myReqs.length;
  const byStatus = {};

      <div class="stat-card"><div class="stat-label">진행중</div><div class="stat-value" style="color:var(--accent)">${inProgressCount}</div></div>
      <div class="stat-card" style="cursor:pointer" onclick="navigateTo('log')"><div class="stat-label">완료</div><div class="stat-value" style="color:var(--green)">${completed}</div></div>

        <div class="donut-wrap">
          <svg class="donut-svg" viewBox="0 0 42 42">
            <circle cx="21" cy="21" r="15.9" fill="none" stroke="var(--surface2)" stroke-width="5"/>
            ${donutSegments.map(d => `<circle cx="21" cy="21" r="15.9" fill="none" stroke="${d.color}" stroke-width="5" stroke-dasharray="${d.pct} ${100-d.pct}" stroke-dashoffset="${-d.offset}" stroke-linecap="round"/>`).join('')}
          </svg>
          <div class="donut-legend">
            ${statusData.map(d => `<div class="donut-legend-item"><div class="donut-legend-dot" style="background:${d.color}"></div><span>${d.name}</span><span class="donut-legend-count">${d.count}</span></div>`).join('')}

    </div>
  `;
}

// ── Log (성과 분석 + 완료 이력) ──
let logPeriod = 'all';
let logCustomFrom = '';
let logCustomTo = '';

function getLogDateRange() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (logPeriod === 'day') return { from: today, to: new Date(today.getTime() + 86400000) };
  if (logPeriod === 'week') return { from: new Date(today.getTime() - 6 * 86400000), to: new Date(today.getTime() + 86400000) };
  if (logPeriod === 'month') return { from: new Date(today.getFullYear(), today.getMonth(), 1), to: new Date(today.getTime() + 86400000) };
  if (logPeriod === 'custom' && logCustomFrom && logCustomTo) return { from: new Date(logCustomFrom), to: new Date(new Date(logCustomTo).getTime() + 86400000) };
  return null;
}

function filterByPeriod(requests) {
  const range = getLogDateRange();
  if (!range) return requests;
  return requests.filter(r => {
    const d = new Date(r.createdAt);
    return d >= range.from && d < range.to;
  });
}

function setLogPeriod(p) {
  logPeriod = p;
  if (p !== 'custom') { renderPage(); }
}

function applyCustomPeriod() {
  logCustomFrom = document.getElementById('logFromDate').value;
  logCustomTo = document.getElementById('logToDate').value;
  if (!logCustomFrom || !logCustomTo) { alert('시작일과 종료일을 모두 선택해주세요.'); return; }
  logPeriod = 'custom';
  renderPage();
}

function renderLog(el) {
  const range = getLogDateRange();
  const all = filterByPeriod(REQUESTS);
  const completed = all.filter(r => r.status === '완료');
  const urgentDone = completed.filter(r => r.priority === '긴급' || r.priority === '높음');
  const avgDays = completed.length > 0 ? (completed.reduce((sum, r) => {
    const start = new Date(r.createdAt);
    const end = new Date(r.timeline[r.timeline.length - 1].date);
    return sum + (end - start) / (1000 * 60 * 60 * 24);
  }, 0) / completed.length).toFixed(1) : '-';
  const completionRate = all.length > 0 ? ((completed.length / all.length) * 100).toFixed(0) : '0';

  const byPriority = {};
  PRIORITIES.forEach(p => byPriority[p] = all.filter(r => r.priority === p).length);
  const maxPri = Math.max(...Object.values(byPriority), 1);
  const priColors = { '긴급': '#f55', '높음': '#ff8c00', '보통': '#5b8def', '낮음': '#22c55e' };

  const periodLabel = logPeriod === 'all' ? '전체' : logPeriod === 'day' ? '오늘' : logPeriod === 'week' ? '최근 7일' : logPeriod === 'month' ? '이번 달' : `${logCustomFrom} ~ ${logCustomTo}`;

  el.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">처리 현황</div><div class="page-subtitle">처리 성과와 완료 이력을 분석합니다</div></div>
    </div>
    <div class="card" style="padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-size:13px;font-weight:600;color:var(--text-mid);margin-right:4px">기간</span>
      ${['all','day','week','month','custom'].map(p => {
        const labels = { all: '전체', day: '오늘', week: '최근 7일', month: '이번 달', custom: '직접 설정' };
        const active = logPeriod === p ? 'background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600' : '';
        return `<button class="btn btn-sm btn-secondary" style="${active}" onclick="setLogPeriod('${p}')">${labels[p]}</button>`;
      }).join('')}
      ${logPeriod === 'custom' ? `<div style="display:flex;align-items:center;gap:6px;margin-left:8px">
        <input type="date" id="logFromDate" class="form-input" style="width:140px;padding:4px 8px;font-size:12px" value="${logCustomFrom}">
        <span style="color:var(--text-dim)">~</span>
        <input type="date" id="logToDate" class="form-input" style="width:140px;padding:4px 8px;font-size:12px" value="${logCustomTo}">
        <button class="btn btn-sm btn-primary" onclick="applyCustomPeriod()">적용</button>
      </div>` : ''}
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">처리 완료</div><div class="stat-value" style="color:var(--green)">${completed.length}<span style="font-size:14px;color:var(--text-dim);font-weight:400"> / ${all.length}</span></div></div>
      <div class="stat-card"><div class="stat-label">처리율</div><div class="stat-value" style="color:var(--accent)">${completionRate}%</div></div>
      <div class="stat-card"><div class="stat-label">평균 처리일</div><div class="stat-value">${avgDays}<span style="font-size:14px;color:var(--text-dim);font-weight:400">일</span></div></div>
      <div class="stat-card"><div class="stat-label">긴급/높음 처리</div><div class="stat-value" style="color:var(--yellow)">${urgentDone.length}</div></div>
    </div>

    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-card-title">긴급도별 요청 분포</div>
        <div class="bar-chart">
          ${PRIORITIES.map(p => `<div class="bar-row">
            <div class="bar-label">${p}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(byPriority[p]/maxPri)*100}%;background:${priColors[p]}"></div></div>
            <div class="bar-value">${byPriority[p]}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">담당자별 처리 현황</div>
        <div class="bar-chart">
          ${(() => {
            const workers = {};
            all.filter(r => r.assignee).forEach(r => {
              const name = r.assignee.name;
              if (!workers[name]) workers[name] = { total: 0, done: 0 };
              workers[name].total++;
              if (r.status === '완료') workers[name].done++;

            return Object.entries(workers).map(([name, w]) => {

              </div>

            </div>`;
            }).join('');
          })()}
        </div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:8px;text-align:right">■ 완료 / ■ 전체 배정</div>

        <tbody>
        ${completed.map(r => {
          const doneDate = r.timeline[r.timeline.length - 1].date.split(' ')[0];
          return `<tr style="cursor:pointer" onclick="openDetail('${r.id}')">
            <td style="font-family:monospace;color:var(--text-dim)">${r.id}</td>
            <td>${r.category}</td>
            <td>${r.title}</td>
            <td><span class="badge" style="background:${PRIORITY_COLORS[r.priority].bg};color:${PRIORITY_COLORS[r.priority].text}">${r.priority}</span></td>

          </tr>`;
        }).join('')}

      </table>` : renderEmptyState('완료된 요청이 없습니다', '처리가 완료되면 이곳에 표시됩니다')}
    </div>
  `;
}

function getAvailableStatuses(status) {
  const transitions = {
    '배정완료': ['진행중'],
    '진행중': ['완료', '배정완료'],
    '완료': ['진행중'],
  };
  return transitions[status] || [];
}

function renderStatusBadge(r) {
  if (currentRole !== 'worker') {
    return `<span class="badge" style="background:${STATUS_COLORS[r.status].bg};color:${STATUS_COLORS[r.status].text}">${r.status}</span>`;
  }
  const nextStatuses = getAvailableStatuses(r.status);
  if (nextStatuses.length === 0) {
    return `<span class="badge" style="background:${STATUS_COLORS[r.status].bg};color:${STATUS_COLORS[r.status].text}">${r.status}</span>`;
  }
  return `<span class="status-badge-btn badge" style="background:${STATUS_COLORS[r.status].bg};color:${STATUS_COLORS[r.status].text}" onclick="event.stopPropagation();toggleStatusDropdown(event,'${r.id}')">${r.status} <span class="arrow">▼</span></span>`;
}

function toggleStatusDropdown(e, reqId) {
  closeStatusDropdown();
  const req = REQUESTS.find(r => r.id === reqId);
  const next = getAvailableStatuses(req.status);
  if (!next.length) return;

  const rect = e.currentTarget.getBoundingClientRect();
  const dd = document.getElementById('statusDropdown');
  const actionLabel = { '배정완료': '← 배정완료로 되돌리기', '진행중': '→ 작업 시작', '완료': '→ 처리 완료' };
  const fromComplete = req.status === '완료';
  if (fromComplete) actionLabel['진행중'] = '← 진행중으로 되돌리기';
  dd.innerHTML = `<div class="status-dropdown-item current" style="pointer-events:none">
    <span class="dot" style="background:${STATUS_COLORS[req.status].text}"></span>현재: ${req.status}
  </div>` + next.map(s => `<div class="status-dropdown-item" onclick="quickChangeStatus('${reqId}','${s}')">
    <span class="dot" style="background:${STATUS_COLORS[s].text}"></span>${actionLabel[s] || s}
  </div>`).join('');
  dd.style.top = (rect.bottom + 4) + 'px';
  dd.style.left = rect.left + 'px';
  dd.classList.add('show');
  setTimeout(() => document.addEventListener('click', closeStatusDropdown, { once: true }), 10);
}

function closeStatusDropdown() {
  const dd = document.getElementById('statusDropdown');
  if (dd) dd.classList.remove('show');
}

function quickChangeStatus(id, newStatus) {
  closeStatusDropdown();
  const req = REQUESTS.find(r => r.id === id);
  const now = new Date().toISOString().slice(0, 16).replace('T', ' ');
  const oldStatus = req.status;
  req.status = newStatus;

  const timelineActions = {
    '진행중': { action: '진행중', detail: oldStatus === '완료' ? '완료 → 진행중으로 상태 변경' : '작업 시작' },
    '완료': { action: '완료', detail: '처리 완료' },
    '배정완료': { action: '상태 변경', detail: '진행중 → 배정완료로 상태 변경' },
  };
  const ta = timelineActions[newStatus];
  if (ta) req.timeline.push({ date: now, action: ta.action, by: USERS.worker1.name, detail: ta.detail });

  if (newStatus === '완료') {
    NOTIFICATIONS.requester.unshift({ id: 'n' + Date.now(), reqId: req.id, message: '요청이 처리 완료되었습니다', time: now, read: false });
    if (req.reporter) {
      NOTIFICATIONS.manager.unshift({ id: 'n' + Date.now() + 1, reqId: req.id, message: `[완료] ${req.title} — 보고자: ${req.reporter.name}`, time: now, read: false });
    }
  } else if (newStatus === '진행중' && oldStatus !== '완료') {
    NOTIFICATIONS.requester.unshift({ id: 'n' + Date.now(), reqId: req.id, message: `${req.title} 작업이 시작되었습니다`, time: now, read: false });
  }

  renderPage();
  renderNotiBadge();
  if (scenarioMode) setTimeout(() => nextScenarioStep(), 300);
}

      <label>담당자</label>
      <select class="filter-select" onchange="filterAssignee=this.value;renderPage()">
        <option value="전체"${filterAssignee==='전체'?' selected':''}>전체</option>
        <option value="미배정"${filterAssignee==='미배정'?' selected':''}>미배정</option>
        ${getAssigneeList().map(n => `<option value="${n}"${filterAssignee===n?' selected':''}>${n}</option>`).join('')}
      </select>
    </div>
    ${hasAdvFilter ? '<button class="filter-reset-btn" onclick="resetAdvFilters()">필터 초기화</button>' : ''}
    <div class="search-wrap" style="margin-left:auto">
      <input class="search-input" placeholder="검색..." value="${currentSearch}" onkeydown="if(event.key==='Enter')execSearch(this.value)">
      <button class="search-btn" onclick="execSearch(this.previousElementSibling.value)" title="검색">🔍</button>
    </div>
  </div>`;

  const statusRow = `<div class="filter-bar">
    <label style="font-size:12px;color:var(--text-dim);white-space:nowrap">상태</label>
    <button class="filter-btn ${currentFilter==='전체'?'active':''}" onclick="filterStatus(this,'전체')">전체</button>
    ${STATUSES.map(s => `<button class="filter-btn ${currentFilter===s?'active':''}" onclick="filterStatus(this,'${s}')">${s}</button>`).join('')}

function filterStatus(btn, status) {
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = status;
  renderPage();
}

function filterSearch(val) {
  currentSearch = val.trim().toLowerCase();
  renderPage();
}

function execSearch(val) {
  currentSearch = val.trim().toLowerCase();
  renderPage();
}

function resetAdvFilters() {
  filterCategory = '전체';
  filterPriority = '전체';
  filterAssignee = '전체';
  renderPage();
}

function applyFilters(reqs) {
  let filtered = reqs;
  if (currentFilter === '미배정') {
    filtered = filtered.filter(r => !r.assignee);
  } else if (currentFilter === '대기중') {
    filtered = filtered.filter(r => r.status === '접수' || r.status === '배정완료');
  } else if (currentFilter !== '전체') {
    filtered = filtered.filter(r => r.status === currentFilter);
  }
  if (currentRole === 'manager') {
    if (filterCategory !== '전체') filtered = filtered.filter(r => r.category === filterCategory);
    if (filterPriority !== '전체') filtered = filtered.filter(r => r.priority === filterPriority);
    if (filterAssignee === '미배정') filtered = filtered.filter(r => !r.assignee);
    else if (filterAssignee !== '전체') filtered = filtered.filter(r => r.assignee && r.assignee.name === filterAssignee);
  }
  if (currentSearch) {
    filtered = filtered.filter(r =>
      r.title.toLowerCase().includes(currentSearch) ||
      r.id.toLowerCase().includes(currentSearch) ||
      r.category.toLowerCase().includes(currentSearch) ||
      r.requester.name.toLowerCase().includes(currentSearch) ||
      (r.assignee && r.assignee.name.toLowerCase().includes(currentSearch))
    );
  }
  return applySorting(filtered);
}

function toggleSort(key) {
  if (sortKey === key) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
  else { sortKey = key; sortDir = 'asc'; }
  renderPage();
}

function applySorting(reqs) {
  if (!sortKey) return reqs;
  const sorted = [...reqs];
  const dir = sortDir === 'asc' ? 1 : -1;
  sorted.sort((a, b) => {
    let va, vb;
    switch (sortKey) {
      case 'id': va = a.id; vb = b.id; break;
      case 'category': va = a.category; vb = b.category; break;
      case 'title': va = a.title; vb = b.title; break;
      case 'priority': va = PRIORITY_ORDER[a.priority]; vb = PRIORITY_ORDER[b.priority]; return (va - vb) * dir;
      case 'status': va = STATUSES.indexOf(a.status); vb = STATUSES.indexOf(b.status); return (va - vb) * dir;
      case 'date': va = a.createdAt; vb = b.createdAt; break;
      case 'assignee': va = a.assignee ? a.assignee.name : ''; vb = b.assignee ? b.assignee.name : ''; break;
      case 'requester': va = a.requester.name; vb = b.requester.name; break;
      default: return 0;
    }
    return va < vb ? -dir : va > vb ? dir : 0;
  });
  return sorted;
}

function sortArrow(key) {
  if (sortKey !== key) return '';
  return ` <span class="sort-arrow">${sortDir === 'asc' ? '▲' : '▼'}</span>`;
}

function renderSortableHeader(columns) {
  return '<div class="req-list-header">' + columns.map(c =>
    c.key ? `<span class="sortable" onclick="toggleSort('${c.key}')">${c.label}${sortArrow(c.key)}</span>` : `<span>${c.label}</span>`
  ).join('') + '</div>';
}

function submitRequest() {
  const cat = document.getElementById('formCategory').value;
  const title = document.getElementById('formTitle').value;
  const content = document.getElementById('formContent').value;
  const priority = document.getElementById('formPriority').value;
  const desiredDate = document.getElementById('formDesiredDate').value;
  if (!cat || !title || !content) { alert('카테고리, 제목, 내용을 입력해주세요.'); return; }
  const id = 'REQ-' + String(REQUESTS.length + 1).padStart(3, '0');
  const now = new Date();
  const nowStr = now.toISOString().slice(0, 16).replace('T', ' ');
  REQUESTS.push({
    id, category: cat, title, content,
    requester: USERS.requester, priority, status: '접수',
    createdAt: nowStr, desiredDate: desiredDate || null,
    assignee: null, reporter: null, estimatedDate: null,
    timeline: [{ date: nowStr, action: '요청 등록', by: USERS.requester.name, detail: title + ' 접수' }],
    comments: [],
  });
  NOTIFICATIONS.manager.unshift({ id: 'n' + Date.now(), reqId: id, message: `[신규] ${title}`, time: nowStr, read: false });
  closeModal('newReqModal');
  document.getElementById('formCategory').value = '';
  document.getElementById('formTitle').value = '';
  document.getElementById('formContent').value = '';
  document.getElementById('formPriority').value = '보통';
  document.getElementById('formDesiredDate').value = '';
  renderSidebar();
  renderPage();
  renderNotiBadge();
  if (scenarioMode) { setTimeout(() => nextScenarioStep(), 300); }
}

function addComment(id) {
  const input = document.getElementById('commentInput');
  if (!input.value.trim()) return;
  const req = REQUESTS.find(r => r.id === id);
  const byUser = currentRole === 'requester' ? USERS.requester : currentRole === 'worker' ? USERS.worker1 : USERS.manager;
  const now = new Date().toISOString().slice(0, 16).replace('T', ' ');
  req.comments.push({ by: byUser.name, date: now, text: input.value.trim() });
  if (currentRole === 'requester') {
    NOTIFICATIONS.worker.unshift({ id: 'n' + Date.now(), reqId: req.id, message: `${byUser.name}님이 댓글을 남겼습니다`, time: now, read: false });
  } else {
    NOTIFICATIONS.requester.unshift({ id: 'n' + Date.now(), reqId: req.id, message: `${byUser.name}님이 댓글을 남겼습니다`, time: now, read: false });
  }
  renderPage();
  renderNotiBadge();
}

// ── Notifications ──
function toggleNoti() {

}

function renderNotiList() {
  const notis = NOTIFICATIONS[currentRole] || [];

    ? '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px">알림이 없습니다</div>'
    : notis.map(n => `<div class="noti-item ${n.read ? '' : 'unread'} ${n.urgent ? 'urgent' : ''}" onclick="openDetail('${n.reqId}');toggleNoti();if(scenarioMode)nextScenarioStep()">
        <div class="noti-dot"></div>
        <div><div class="noti-msg">${n.message}</div><div class="noti-time">${n.time}</div></div>

function renderNotiBadge() {

}

function markAllRead() {
  (NOTIFICATIONS[currentRole] || []).forEach(n => n.read = true);
  renderNotiList();
  renderNotiBadge();
}

// ── Dev Mode ──
function toggleDevPanel() {
  const toggle = document.getElementById('devModeToggle');
  devMode = toggle.checked;
  document.getElementById('devPanel').classList.toggle('open', devMode);
  if (devMode) {
    document.addEventListener('click', devClickHandler, true);
  } else {
    document.removeEventListener('click', devClickHandler, true);
    if (devHighlighted) { devHighlighted.classList.remove('dev-highlight'); devHighlighted = null; }
  }
}

function closeDevPanel() {
  const toggle = document.getElementById('devModeToggle');
  toggle.checked = false;
  toggleDevPanel();
}

function devClickHandler(e) {
  if (e.target.closest('.dev-panel') || e.target.closest('.header') || e.target.closest('.hamburger-wrap')) return;
  if (!devMode) return;
  e.preventDefault();
  e.stopPropagation();
  if (devHighlighted) devHighlighted.classList.remove('dev-highlight');
  devHighlighted = e.target;
  devHighlighted.classList.add('dev-highlight');
  renderDevInfo(e.target);
}

function renderDevInfo(el) {
  const tag = el.tagName.toLowerCase();
  const id = el.id ? '#' + el.id : '';
  const cls = el.className ? '.' + el.className.split(' ').filter(c => c !== 'dev-highlight').join('.') : '';
  const computed = getComputedStyle(el);
  const chain = getChain(el);
  const selector = getSelector(el);

  document.getElementById('devContent').innerHTML = `
    <div class="dev-section">
      <div class="dev-section-title"><span class="dot" style="background:var(--accent)"></span> 구조</div>
      <div class="dev-tag">&lt;${tag}&gt; ${id}${cls}</div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px">${tag} in ${el.parentElement ? el.parentElement.className.split(' ')[0] || el.parentElement.tagName.toLowerCase() : 'root'}</div>
    </div>
    <div class="dev-section">
      <div class="dev-section-title"><span class="dot" style="background:var(--blue)"></span> 컴포넌트 체인</div>
      <div class="dev-chain">${chain}</div>
    </div>
    <div class="dev-section">
      <div class="dev-section-title"><span class="dot" style="background:var(--green)"></span> 파일</div>
      <div class="dev-path">${selector}</div>
      <button class="dev-copy-btn" onclick="copySelector()">📋 AI에게 경로 복사</button>
    </div>
    <div class="dev-section">
      <div class="dev-section-title"><span class="dot" style="background:var(--red)"></span> 색상</div>
      <div class="dev-color-row"><label>Background</label><div class="color-group"><input type="color" class="dev-color-input" value="${rgbToHex(computed.backgroundColor)}" onchange="applyColor(this,'backgroundColor')"><input class="dev-color-hex" value="${rgbToHex(computed.backgroundColor)}" readonly></div></div>
      <div class="dev-color-row"><label>Text</label><div class="color-group"><input type="color" class="dev-color-input" value="${rgbToHex(computed.color)}" onchange="applyColor(this,'color')"><input class="dev-color-hex" value="${rgbToHex(computed.color)}" readonly></div></div>
      <div class="dev-color-row"><label>Border</label><div class="color-group"><input type="color" class="dev-color-input" value="${rgbToHex(computed.borderColor)}" onchange="applyColor(this,'borderColor')"><input class="dev-color-hex" value="${rgbToHex(computed.borderColor)}" readonly></div></div>
    </div>
    <div class="dev-section">
      <div class="dev-section-title"><span class="dot" style="background:var(--yellow)"></span> 타이포그래피</div>
      <div class="dev-slider-row"><label>크기</label><input type="range" min="10" max="36" value="${parseInt(computed.fontSize)}" oninput="applyFont(this,'fontSize')"><input class="val" value="${parseInt(computed.fontSize)}" readonly> px</div>
      <div class="dev-slider-row"><label>자간</label><input type="range" min="-2" max="5" step="0.5" value="${parseFloat(computed.letterSpacing) || 0}" oninput="applyFont(this,'letterSpacing')"><input class="val" value="${parseFloat(computed.letterSpacing) || 0}" readonly> px</div>
      <div style="font-size:12px;color:var(--text-dim);margin:6px 0 4px">굵기</div>
      <div class="dev-weight-btns">
        ${[['R',400],['M',500],['SB',600],['B',700]].map(([l,w]) =>
          `<button class="dev-weight-btn ${parseInt(computed.fontWeight)===w?'active':''}" onclick="applyWeight(${w},this)">${l}</button>`
        ).join('')}
      </div>
    </div>
  `;
}

function getChain(el) {
  const parts = [];
  let cur = el;
  while (cur && cur !== document.body) {
    const tag = cur.tagName.toLowerCase();
    const id = cur.id ? ' #' + cur.id : '';
    const cls = cur.className ? '.' + cur.className.split(' ').filter(c=>c!=='dev-highlight').slice(0,1).join('.') : '';
    parts.unshift({ label: `${tag}${id}${cls}`, isCurrent: cur === el });
    cur = cur.parentElement;
  }
  return parts.map((p, i) => {
    const indent = '│ '.repeat(i);
    return `${indent}${p.isCurrent ? `<span class="active-node">${p.label}</span>` : p.label}`;
  }).join('<br>');
}

function getSelector(el) {
  const parts = [];
  let cur = el;
  while (cur && cur !== document.body) {
    const tag = cur.tagName.toLowerCase();
    const cls = cur.className ? '.' + cur.className.split(' ').filter(c=>c!=='dev-highlight').slice(0,1).join('.') : '';
    parts.unshift(tag + cls);
    cur = cur.parentElement;
  }
  return parts.join(' > ');
}

function copySelector() {
  const path = document.querySelector('.dev-path').textContent;
  navigator.clipboard.writeText(path).then(() => {
    const btn = document.querySelector('.dev-copy-btn');
    btn.textContent = '✅ 복사됨!';
    setTimeout(() => btn.textContent = '📋 AI에게 경로 복사', 1500);
  });
}

function applyColor(input, prop) {
  if (!devHighlighted) return;
  devHighlighted.style[prop] = input.value;
  input.nextElementSibling.value = input.value;
}

function applyFont(input, prop) {
  if (!devHighlighted) return;
  devHighlighted.style[prop] = input.value + 'px';
  input.nextElementSibling.value = input.value;
}

function applyWeight(w, btn) {
  if (!devHighlighted) return;
  devHighlighted.style.fontWeight = w;
  btn.parentElement.querySelectorAll('.dev-weight-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function rgbToHex(rgb) {
  if (!rgb || rgb === 'transparent' || rgb === 'rgba(0, 0, 0, 0)') return '#000000';
  const match = rgb.match(/\d+/g);
  if (!match || match.length < 3) return '#000000';
  return '#' + match.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('');
}

let scenarioClickTargets = [];

function clearScenarioTargets() {
  scenarioClickTargets.forEach(({ el, handler, evt }) => {
    if (evt) {
      el.removeEventListener(evt, handler);
    } else {
      el.removeEventListener('click', handler, true);
    }
  });
  scenarioClickTargets = [];
  document.querySelectorAll('.scenario-target, .scenario-target-no-label').forEach(el => {
    el.classList.remove('scenario-target', 'scenario-target-no-label', 'clicked');
  });
}

function highlightScenarioTargets(s) {
  clearScenarioTargets();
  if (!s.target) return;
    const selectors = s.target.split(',').map(t => t.trim());
    selectors.forEach(sel => {
      const el = Array.from(document.querySelectorAll(sel)).find(e => !e.closest('#scenarioBar') && (!e.closest('.header') || e.classList.contains('noti-btn') || e.classList.contains('noti-item')));
      if (el) {
        const isClickable = s.targetLabel !== false;
        const cls = isClickable ? 'scenario-target' : 'scenario-target-no-label';
        el.classList.add(cls);

        const modal = el.closest('.modal-body');
        if (modal) {
          el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        if (!isClickable) {
          const handler = function() { el.classList.add('clicked'); };
          el.addEventListener('click', handler);
          scenarioClickTargets.push({ el, handler, evt: 'click' });
        }
        if (isClickable) {
          const isFormField = el.tagName === 'SELECT' || el.tagName === 'INPUT' || el.tagName === 'TEXTAREA';
          if (isFormField) {
            const evt = el.tagName === 'SELECT' ? 'change' : 'input';
            const handler = function() {
              if (el.value && el.value.trim() !== '') {
                setTimeout(() => nextScenarioStep(), 400);
              }
            };
            el.addEventListener(evt, handler);
            scenarioClickTargets.push({ el, handler, evt });
          } else {
            const handler = function(e) {
              e.preventDefault();
              e.stopPropagation();
              nextScenarioStep();
            };
            el.addEventListener('click', handler, true);
            scenarioClickTargets.push({ el, handler });
          }
        }
      }
    });
}

function getScenarioGroups(steps) {
  const groups = [];
  let currentGroup = null;
  steps.forEach((s, i) => {
    if (!currentGroup || currentGroup.name !== s.group) {
      currentGroup = { name: s.group, startIdx: i, count: 0 };
      groups.push(currentGroup);
    }
    currentGroup.count++;
  });
  return groups;
}

  openModal('stakeholderMapModal');
}

      const first = cols[0], last = cols[cols.length - 1];
      const rowRect = row.getBoundingClientRect();
      const leftCenter = first.getBoundingClientRect().left + first.offsetWidth / 2 - rowRect.left;
      const rightCenter = last.getBoundingClientRect().left + last.offsetWidth / 2 - rowRect.left;

      const lineLeft = (leftCenter / totalWidth) * 100;
