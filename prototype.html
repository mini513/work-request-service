<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사내 업무 요청 서비스</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow: hidden; height: 100vh; }
  :root {
    --bg: #0e1015;
    --surface: #161a22;
    --surface2: #1e2330;
    --surface3: #262c3a;
    --border: #2a3040;
    --text: #e2e5ec;
    --text-dim: #7b8298;
    --text-mid: #a0a8be;
    --accent: #5b8def;
    --accent-bg: rgba(91,141,239,0.12);
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --red: #f55;
    --red-bg: rgba(255,85,85,0.12);
    --yellow: #ff8c00;
    --yellow-bg: rgba(255,140,0,0.12);
    --radius: 8px;
  }
  body.light {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f5f6f8;
    --surface3: #e8eaef;
    --border: #d4d8e0;
    --text: #1a1d27;
    --text-dim: #6b7085;
    --text-mid: #4a5068;
    --accent: #4f46e5;
    --accent-bg: rgba(79,70,229,0.1);
    --green: #16a34a;
    --green-bg: rgba(22,163,74,0.1);
    --red: #dc2626;
    --red-bg: rgba(220,38,38,0.08);
    --yellow: #f97316;
    --yellow-bg: rgba(249,115,22,0.1);
  }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-size: 14px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    min-height: 52px;
  }
  .header-title {
    font-size: 16px;
    font-weight: 600;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* Theme toggle */
  .theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
  }
  .theme-toggle:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .placeholder {
    text-align: center;
    color: var(--text-dim);
  }
  .placeholder h2 {
    font-size: 20px;
    margin-bottom: 8px;
    color: var(--text-mid);
  }
  .placeholder p {
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">사내 업무 요청 서비스</div>
  <div class="header-actions">
    <button class="theme-toggle" onclick="toggleTheme()">Theme</button>
  </div>
</div>

<div class="main">
  <div class="placeholder">
    <h2>사내 업무 요청 서비스</h2>
    <p>여기에 프로토타입을 구현하세요</p>
  </div>
</div>

<script>
function toggleTheme() {
  document.body.classList.toggle('light');
}
</script>

</body>
</html>
