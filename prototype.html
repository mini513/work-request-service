function openScenarioMap() {
  const roleLabels = { requester: '요청자', manager: '관리자', worker: '실무자' };
  const roleIcons = { requester: '👤', manager: '👔', worker: '🔧' };
  const roleOrder = ['requester', 'manager', 'worker'];

  let html = '';
  roleOrder.forEach(role => {
    const roleScenarios = SCENARIOS.filter(s => s.role === role);
    if (!roleScenarios.length) return;

    const groups = [];
    let currentGroup = null;
    roleScenarios.forEach(s => {
      if (!currentGroup || currentGroup.name !== s.group) {
        currentGroup = { name: s.group, steps: [] };
        groups.push(currentGroup);
      }
      const cleanText = s.text.replace(/<[^>]+>/g, '').replace(/^.*?[①-⑩]\s*/, '').trim();
      currentGroup.steps.push(cleanText);
    });

    html += `<div class="smap-role-section">
      <div class="smap-role-header ${role}">${roleIcons[role]} ${roleLabels[role]}</div>
      <div class="smap-label">Main Flow →</div>
      <div class="smap-main-flow">
        ${groups.map((g, i) => `
          ${i > 0 ? '<div class="smap-connector">→</div>' : ''}
          <div class="smap-node">
            <div class="smap-node-box">${g.name}</div>
            ${g.steps.length > 0 ? `<div class="smap-sub-steps">
              ${g.steps.map(st => {
                const short = st.length > 22 ? st.slice(0, 22) + '…' : st;
                return `<div class="smap-sub-step" title="${st.replace(/"/g, '&quot;')}">${short}</div>`;
              }).join('')}
            </div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>`;
  });

  html += `<div class="smap-legend">
    <span>📋 시나리오 데이터에서 자동 생성 · 총 ${SCENARIOS.length}개 스텝</span>
  </div>`;

  document.getElementById('scenarioMapBody').innerHTML = html;
  openModal('scenarioMapModal');
}

function startScenario() {
  filteredScenarios = SCENARIOS.filter(s => s.role === currentRole);
  if (filteredScenarios.length === 0) { filteredScenarios = SCENARIOS; }
  scenarioActive = true;
  scenarioStep = 0;
  document.getElementById('scenarioBar').classList.add('show');
  applyScenarioStep();
}

function exitScenario() {
  scenarioActive = false;
  clearScenarioTargets();
  document.getElementById('scenarioBar').classList.remove('show');
}

function nextScenarioStep() {
  if (scenarioStep < filteredScenarios.length - 1) { scenarioStep++; applyScenarioStep(); }
}

function prevScenarioStep() {
  if (scenarioStep > 0) { scenarioStep--; applyScenarioStep(); }
}

function jumpScenarioStep(idx) {
  scenarioStep = idx;
  applyScenarioStep();
}

function applyScenarioStep() {
  clearScenarioTargets();
  const s = filteredScenarios[scenarioStep];
  switchRole(s.role);

  const needsModal = s.action === 'openNewReq' || s.action === 'keepModal' || s.action === 'openAssign' || s.action === 'keepAssignModal' || s.action === 'openReject' || s.action === 'keepRejectModal';
  if (!needsModal) {
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
  }

  if (s.detail) { currentDetailId = s.detail; renderPage(); }
  else if (s.page === 'new') { }
  else if (!needsModal || !document.querySelector('.modal-overlay.show')) {
    currentPage = s.page; currentDetailId = null; renderSidebar(); renderPage();
  }

  if (s.beforeAction) s.beforeAction();

  if (s.action === 'openNewReq') { setTimeout(() => openModal('newReqModal'), 200); }
  if (s.action === 'openAssign') { setTimeout(() => openModal('assignModal'), 200); }
  if (s.action === 'openReject') { setTimeout(() => openRejectModal('REQ-005'), 200); }
  if (s.action === 'openNoti') { setTimeout(() => { document.querySelector('.noti-btn').click(); }, 200); }

  document.getElementById('scenarioText').innerHTML = `<span class="scenario-group-label">${s.group}</span> ${s.text}`;

  const groups = getScenarioGroups(filteredScenarios);
  let progressHtml = '';
  groups.forEach((g, gi) => {
    if (gi > 0) progressHtml += '<div class="scenario-group-divider"></div>';
    const isActiveGroup = scenarioStep >= g.startIdx && scenarioStep < g.startIdx + g.count;
    progressHtml += `<span class="scenario-group-name ${isActiveGroup ? 'active' : ''}">${g.name}</span>`;
    for (let i = g.startIdx; i < g.startIdx + g.count; i++) {
      const cls = i < scenarioStep ? 'done' : (i === scenarioStep ? 'current' : '');
      const stepInGroup = i - g.startIdx + 1;
      progressHtml += `<div class="scenario-step-chip ${cls}" onclick="jumpScenarioStep(${i})" title="${g.name} ${stepInGroup}/${g.count}">${stepInGroup}</div>`;
    }
  });
  document.getElementById('scenarioProgress').innerHTML = progressHtml;

  const highlightDelay = needsModal ? 300 : 100;
  setTimeout(() => highlightScenarioTargets(s), highlightDelay);
}

// ── Helpers ──
function getDaysSince(dateStr) {
  return (new Date() - new Date(dateStr)) / (1000 * 60 * 60 * 24);
}

// ── Close dropdowns on outside click ──
document.addEventListener('click', e => {
  if (!e.target.closest('.noti-wrap')) {
    document.getElementById('notiDropdown').classList.remove('show');
  }
  if (!e.target.closest('.hamburger-wrap')) {
    document.getElementById('hamburgerDropdown').classList.remove('show');
  }
});

// ── Init ──
renderSidebar();
renderPage();
renderNotiBadge();
</script>
